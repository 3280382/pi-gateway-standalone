<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Pi Gateway - AI Coding Agent</title>
  
  <!-- Debug System - 最先同步加载，确保 React 出错时也能调试 -->
  <script src="/debug-system.js"></script>
  
  <!-- UI Marker - 浏览器端可视化选择器，帮助 AI 理解页面元素 -->
  <script src="/ui-marker.js"></script>
  
  <script type="module">
    import RefreshRuntime from "/@react-refresh"

    RefreshRuntime.injectIntoGlobalHook(window)
    window.$RefreshReg$ = () => {}
    window.$RefreshSig$ = () => (type) => type
    window.__vite_plugin_react_preamble_installed__ = true
  </script>
  <!-- Local Fonts -->
  <link rel="stylesheet" href="fonts/inter.css">
  <link rel="stylesheet" href="fonts/jetbrains-mono.css">
  <!-- Prism.js for syntax highlighting (with autoloader for lazy loading) -->
  <link rel="stylesheet" href="vendor/prism/prism-tomorrow.min.css" />
  <script src="vendor/prism/prism.js"></script>
  <script src="vendor/prism/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    // Configure Prism Autoloader - languages will be loaded on-demand
    Prism.plugins.autoloader.languages_path = 'vendor/prism/components/';
  </script>
</head>
<body>
  <!-- React Application Mount Point -->
  <div id="root"></div>
  
  <!-- Error handling -->
  <script>
    window.onerror = (msg, _url, line, col, _error) => {
      document.body.innerHTML += `<div style="color:red;padding:20px;">Error: ${msg} at ${line}:${col}</div>`;
      return false;
    };
    window.addEventListener('error', (e) => {
      console.error('Error:', e);
    });
  </script>
  
  <!-- Vite handles this script tag -->
  <script type="module" src="/src/client/main.tsx"></script>
</body>
</html>

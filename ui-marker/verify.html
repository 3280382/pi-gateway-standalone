<!DOCTYPE html>
<html>
<head>
    <title>UI Marker 验证测试</title>
    <script src="./dist/ui-marker.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { margin: 5px; padding: 10px; }
        .result { margin: 10px 0; padding: 10px; background: #f0f0f0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>UI Marker v2.0 基本功能验证</h1>
    
    <div id="testArea">
        <button id="testBtn1">测试按钮 1</button>
        <button id="testBtn2">测试按钮 2</button>
        <input type="text" placeholder="测试输入框">
        <a href="#test">测试链接</a>
    </div>
    
    <div id="results"></div>
    
    <script>
        const results = [];
        
        function logResult(name, passed, message) {
            const result = { name, passed, message, time: new Date() };
            results.push(result);
            
            const div = document.createElement('div');
            div.className = `result ${passed ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${passed ? '✅' : '❌'} ${name}</strong>: ${message}`;
            document.getElementById('results').appendChild(div);
            
            console.log(`[验证] ${passed ? '通过' : '失败'}: ${name} - ${message}`);
        }
        
        // 测试 1: UIMarker 类是否存在
        logResult('UIMarker 类加载', 
            typeof window.UIMarker === 'function',
            `UIMarker: ${typeof window.UIMarker}`
        );
        
        // 测试 2: uiMarker 实例是否存在
        logResult('uiMarker 实例', 
            window.uiMarker && typeof window.uiMarker === 'object',
            `uiMarker: ${window.uiMarker ? '已创建' : '未创建'}`
        );
        
        // 测试 3: 创建自定义实例
        let customMarker;
        try {
            customMarker = new UIMarker();
            logResult('创建自定义实例', true, 'UIMarker 构造函数工作正常');
        } catch (e) {
            logResult('创建自定义实例', false, `构造函数错误: ${e.message}`);
        }
        
        // 测试 4: 激活/停用方法
        if (customMarker) {
            try {
                customMarker.activate();
                logResult('激活方法', true, 'activate() 方法正常');
                
                setTimeout(() => {
                    customMarker.deactivate();
                    logResult('停用方法', true, 'deactivate() 方法正常');
                    
                    // 测试 5: 扫描元素
                    const scanner = customMarker.scanner;
                    if (scanner) {
                        const markers = scanner.scan();
                        logResult('元素扫描', 
                            Array.isArray(markers) && markers.length >= 3,
                            `扫描到 ${markers.length} 个元素 (预期 ≥3)`
                        );
                    }
                    
                    // 汇总结果
                    const passed = results.filter(r => r.passed).length;
                    const total = results.length;
                    const successRate = Math.round((passed / total) * 100);
                    
                    const summary = document.createElement('div');
                    summary.className = 'result';
                    summary.style.background = successRate === 100 ? '#d4edda' : successRate >= 80 ? '#fff3cd' : '#f8d7da';
                    summary.innerHTML = `
                        <h3>📊 验证结果汇总</h3>
                        <p>总测试: ${total} | 通过: ${passed} | 失败: ${total - passed}</p>
                        <p>成功率: <strong>${successRate}%</strong></p>
                        <p>${successRate === 100 ? '🎉 所有测试通过！' : successRate >= 80 ? '⚠️ 大部分测试通过' : '❌ 需要修复问题'}</p>
                    `;
                    document.getElementById('results').appendChild(summary);
                    
                    // 控制台输出
                    console.log(`
%c🔍 UI Marker v2.0 验证完成 %c
测试总数: ${total}
通过: ${passed}
失败: ${total - passed}
成功率: ${successRate}%

${successRate === 100 ? '✅ 所有功能正常，可以投入使用' : '⚠️ 部分功能需要检查'}

详细结果已显示在页面上。
                    `.trim(), 'background: #4f46e5; color: white; padding: 8px; border-radius: 4px;', '');
                    
                }, 100);
                
            } catch (e) {
                logResult('激活/停用方法', false, `运行时错误: ${e.message}`);
            }
        }
    </script>
</body>
</html>
